<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JIN Legal Counsel — Amplop DL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* DL envelope 220mm wide x 110mm tall (landscape) */
  @page { size: 220mm 110mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 220mm; height: 110mm; }
  body {
    font-family: 'Jost', sans-serif;
    color: #1a2420;
    background: #fff;
    padding: 10mm 12mm;
    display: flex; flex-direction: column;
    position: relative;
  }

  .brand-block { display: flex; align-items: center; gap: 5mm; max-width: 95mm; }
  .logo { height: 12mm; width: auto; flex-shrink: 0; }
  .brand-text .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12pt; font-weight: 500; color: #0e2820;
    letter-spacing: 0.3pt; line-height: 1;
  }
  .brand-text .tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 6.5pt; color: #c9a84c;
    margin-top: 0.5mm; letter-spacing: 0.2pt;
  }

  .gold-line {
    height: 0.5pt; background: #c9a84c;
    margin: 4mm 0 3mm; width: 50mm;
  }

  .address {
    font-size: 7.5pt; line-height: 1.5; max-width: 95mm;
  }
  .contact-line {
    margin-top: 2mm; font-size: 6.5pt; color: #1a2420;
  }
  .contact-line .dot { color: #c9a84c; margin: 0 1.5mm; }

  /* Top-right corner: postage area */
  .postage-area {
    position: absolute;
    top: 10mm; right: 12mm;
    width: 22mm; height: 26mm;
    border: 0.3pt dashed #d8d0c4;
    display: flex; align-items: center; justify-content: center;
    font-size: 5.5pt; letter-spacing: 0.8pt; color: #c9a84c;
    text-transform: uppercase;
  }

  /* Subtle bottom-right tagline */
  .corner-tagline {
    position: absolute; bottom: 8mm; right: 12mm;
    text-align: right;
  }
  .corner-tagline .text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 7pt; font-style: italic; color: #6b7f78;
    letter-spacing: 0.2pt;
  }
</style>
</head>
<body>
  <div class="postage-area">Materai</div>

  <header class="brand-block">
    <img class="logo" src="../logo/jin-logo-crop.png" alt="JIN Legal Counsel">
    <div class="brand-text">
      <div class="name">JIN Legal Counsel</div>
      <div class="tag">Legal Excellence, Strategic Results.</div>
    </div>
  </header>

  <div class="gold-line"></div>

  <div class="address">
    Komp. BMS 1 Lt. 2, Jl. Timbul No. 2<br>
    Pejaten Barat, Jakarta Selatan&nbsp;&middot;&nbsp;12510
    <div class="contact-line">
      +62 811-8780-078 <span class="dot">&middot;</span> center@jin-legal.com <span class="dot">&middot;</span> jin-legal.com
    </div>
  </div>

  <div class="corner-tagline">
    <div class="text">PT Juris International Network</div>
  </div>
</body>
</html>
